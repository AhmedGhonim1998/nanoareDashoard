<div class="login-page">
  <div class="login-card">
    <h2>تسجيل دخول الإدارة</h2>
    <p>مرحباً بك، يرجى إدخال بياناتك للمتابعة</p>

    <form (ngSubmit)="onLogin()">
      <div class="form-group">
        <label>اسم المستخدم</label>
        <input type="text" name="username" [(ngModel)]="loginData.username" required placeholder="Username">
      </div>

      <div class="form-group">
        <label>كلمة المرور</label>
        <input type="password" name="password" [(ngModel)]="loginData.password" required placeholder="••••••••">
      </div>

      <div *ngIf="errorMessage" class="error-msg">
        {{ errorMessage }}
      </div>

      <button type="submit" class="login-btn">دخول</button>
    </form>
  </div>
</div>
